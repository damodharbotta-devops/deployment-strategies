---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mydeployment
  labels:
    app: swiggy

spec:
  replicas: 3
  selector:
    matchLabels:
      app: swiggy
  template:
    metadata:
      labels:
        app: swiggy

    spec:
      containers:
        - name: cont1
          image: shaikmustafa/paytm:movie
          ports:
            - containerPort: 80

